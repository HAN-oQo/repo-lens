# Isolated PUBLIC backend for the login-gated demo — separate from CE/internal infra,
# so if it breaks, nothing internal is affected. Public repos work for any signed-in
# user; private repos work with that user's forwarded token.
#
# Deploy (needs a Fly account; isolated from your CE node):
#   fly launch --no-deploy --name repolens-demo
#   fly secrets set GH_CLIENT_ID=… GH_CLIENT_SECRET=… ANTHROPIC_API_KEY=…   # or ASK_URL=…
#   fly volumes create repolens_data --size 3
#   fly deploy
# Then set GitHub repo variables so the Pages demo uses it:
#   gh variable set REPOLENS_API_BASE  --body https://repolens-demo.fly.dev
#   gh variable set REPOLENS_OAUTH_BASE --body https://repolens-demo.fly.dev
# OAuth App callback = https://repolens-demo.fly.dev/gh/callback

app = "repolens-demo"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_API_BASE = "https://repolens-demo.fly.dev"
    NEXT_PUBLIC_OAUTH_BASE = "https://repolens-demo.fly.dev"

[env]
  AUTH_REQUIRED = "1"
  CLONE_ALLOWED_HOSTS = "github.com"
  ALLOWED_REDIRECTS = "https://han-oqo.github.io/repo-lens,https://repolens-demo.fly.dev"
  PORT = "8080"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "repolens_data"
  destination = "/data"
