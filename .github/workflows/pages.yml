name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      # Set repo variables REPOLENS_API_BASE / REPOLENS_OAUTH_BASE to the public
      # backend URL to make the public demo use v2 (login-gated). Unset → v1 browser.
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: ${{ vars.REPOLENS_API_BASE }}
          NEXT_PUBLIC_OAUTH_BASE: ${{ vars.REPOLENS_OAUTH_BASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
