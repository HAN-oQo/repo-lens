# Repo Lens on the CE cluster — the askbot pattern (NOT nginx-ingress).
#
# Repo Lens is an XHR app with its OWN GitHub login (/gh/*) + AUTH_REQUIRED gate,
# exactly like askbot (a widget that self-gates). So it does NOT sit behind the
# blog's interactive Google oauth2-proxy — that would break /api XHR and the
# /gh/callback flow. Instead, same shape as server/k8s/40-askbot.yaml in
# moreh-dev/ce-training:
#
#   public edge 1.249.213.127  ── terminates TLS for *.ce.moreh.dev (SRE-managed)
#     │ http (Host: repolens.ce.moreh.dev)
#     ▼
#   istio public-gw :80        ── istio-system/public-gw (shared Gateway API gw)
#     │ HTTPRoute repolens (forces X-Forwarded-Proto: https, no request timeout)
#     ▼
#   repolens-origin Service (selector-less) ─► EndpointSlice ─► ce-master 192.168.2.20:8080
#                                                                └─ the host systemd service
#                                                                   (deploy/repolens.service)
#
# So there is NO Deployment / image registry / cert-manager / TLS Secret here:
# the workload runs on the host (see deploy/repolens.service + DEPLOY.md), TLS is
# terminated at the edge, and the cluster only needs Service + EndpointSlice +
# HTTPRoute. Gating is in the app (GitHub login + AUTH_REQUIRED=1).
#
# Apply on ce-master:  deploy/k8s/apply.sh   (or the kubectl block in the README)
---
apiVersion: v1
kind: Namespace
metadata:
  name: repo-lens
  labels:
    app.kubernetes.io/part-of: repo-lens
---
# Selector-less Service + EndpointSlice → the host service on the ce-master node.
# 192.168.2.20 is the ce-master node IP (same endpoint askbot uses). If the node
# IP differs, check `kubectl get node -o wide` and update the address below.
apiVersion: v1
kind: Service
metadata:
  name: repolens-origin
  namespace: repo-lens
  labels:
    app.kubernetes.io/part-of: repo-lens
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: repolens-origin-1
  namespace: repo-lens
  labels:
    kubernetes.io/service-name: repolens-origin
    app.kubernetes.io/part-of: repo-lens
addressType: IPv4
ports:
  - name: http
    port: 8080
    protocol: TCP
endpoints:
  - addresses:
      - 192.168.2.20      # ce-master node IP (same as askbot-origin)
    conditions:
      ready: true
---
# Public route: repolens.ce.moreh.dev -> repolens-origin (the host service).
# Attaches to the shared istio public gateway (istio-system/public-gw, :80 HTTP),
# cross-namespace exactly like ce-blog's own route does.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: repolens
  namespace: repo-lens
  labels:
    app.kubernetes.io/part-of: repo-lens
spec:
  hostnames:
    - repolens.ce.moreh.dev
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gw
      namespace: istio-system
      sectionName: http
  rules:
    # TLS is terminated at the edge upstream of the cluster, which forwards plain
    # HTTP here. Force X-Forwarded-Proto=https so the OAuth flow issues https
    # redirects (callback https://repolens.ce.moreh.dev/gh/callback) and the app
    # builds https URLs — same reason the blog route sets it.
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      # GraphRAG /api/ask (clone + graphify + LLM) can take a while; the gateway's
      # default ~15s timeout would 504 it. Disable per-request timeouts like askbot.
      timeouts:
        request: "0s"
        backendRequest: "0s"
      backendRefs:
        - group: ""
          kind: Service
          name: repolens-origin
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
